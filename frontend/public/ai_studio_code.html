<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Thick Tile Prediction Card</title>
    <style>
        /* Base styles */
        body {
            background-color: #000000; /* Updated to pure pitch black */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Main Card Container - 3D Thick Tile Styling for Black Background */
        .card {
            /* Very dark grey face so it stands out against the pure black body */
            background-color: #121212; 
            width: 350px;
            border-radius: 20px; 
            
            /* A subtle border to help define the shape against the black background */
            border: 1px solid #1f1f1f;
            
            /* The 3D stacked shadows adapted for pure black */
            box-shadow: 
                inset 1px 1px 1px rgba(255, 255, 255, 0.05), /* Subtle top edge highlight */
                0 8px 0 #050505; /* THE THICKNESS: Very dark grey, just barely visible against black */
                
            display: flex;
            flex-direction: column;
            
            /* Smooth transition for interactive hover effect */
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        /* Subtle interactive push effect on hover */
        .card:hover {
            transform: translateY(2px); /* Moves down slightly */
            box-shadow: 
                inset 1px 1px 1px rgba(255, 255, 255, 0.05),
                0 6px 0 #050505; /* Thickness reduces to simulate pushing */
        }

        /* Header */
        .header {
            display: flex;
            justify-content: flex-start;
            align-items: center; 
            gap: 16px;
            padding: 24px 20px 20px;
        }

        .bitcoin-logo {
            width: 52px; 
            height: 52px;
            flex-shrink: 0;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.5)); 
        }

        .bitcoin-logo svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        .title {
            color: #ffffff;
            font-size: 22px;
            font-weight: 700; 
            line-height: 1.3;
            margin: 0;
            letter-spacing: -0.3px;
        }

        /* Main Content */
        .content {
            padding: 10px 20px 24px;
            display: flex;
            flex-direction: column;
        }

        /* Stat Rows */
        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            font-size: 16px;
        }

        /* Typography colors */
        .text-muted {
            color: #8b8f98; 
            font-weight: 400;
        }

        .text-active {
            color: #ffffff;
            font-weight: 500;
        }
        
        .dash {
            font-family: monospace;
            font-size: 16px;
            letter-spacing: -1px;
            opacity: 0.7;
        }

        .dash-purple {
            color: #6435e8; 
            opacity: 1;
            text-shadow: 0 0 8px rgba(100, 53, 232, 0.5); 
        }

        /* Profit Row with recessed top divider */
        .profit-row {
            border-top: 1px solid #1f1f1f;
            box-shadow: inset 0 1px 0 rgba(0, 0, 0, 0.5); 
            padding-top: 16px;
            margin-top: 4px;
            margin-bottom: 24px;
        }

        .profit-label {
            color: #8b8f98;
            font-size: 16px;
        }

        .profit-value {
            color: #ffffff;
            font-size: 16px;
            font-weight: 500;
        }

        /* Action Button */
        .btn-wrapper {
            width: 100%;
        }

        .cash-out-btn {
            width: 100%;
            background-color: #6435e8;
            color: #ffffff;
            border: none;
            border-radius: 12px;
            padding: 16px 0;
            font-size: 18px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            
            /* 3D treatment for button */
            box-shadow: 
                inset 1px 1px 1px rgba(255, 255, 255, 0.2), 
                0 6px 0 #3b1b94; /* Purple 3D thickness */
                
            transition: transform 0.1s ease, box-shadow 0.1s ease;
        }

        /* Button Press state */
        .cash-out-btn:active {
            transform: translateY(6px); 
            box-shadow: 
                inset 1px 1px 1px rgba(255, 255, 255, 0.1),
                0 0px 0 #3b1b94; 
        }
    </style>
</head>

            <div class="stat-row">
                <span class="text-muted">Sharpness</span>

            </div>
            <div class="stat-row">
                <span class="text-muted">Lead Time</span>

            </div>
            <div class="stat-row">
                <span class="text-active">Total Quality</span>

            <div class="stat-row profit-row">
                <span class="profit-label">Est. Profit</span>
                <span class="profit-value">+0.0000 USDC (1.00x)</span>
            </div>

            <!-- Action Button -->
            <div class="btn-wrapper">
                <button class="cash-out-btn">Cash Out</button>
            </div>
        </div>
    </div>
