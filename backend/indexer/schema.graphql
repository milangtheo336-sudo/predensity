# ---------------- USER ----------------
type User @entity(immutable: false) {
  id: ID!
  stats: UserStats!
  totalBets: Int!
  bets: [Bet!]! @derivedFrom(field: "user")
}

type UserStats @entity(immutable: false) {
  id: ID!
  totalBets: Int!
  totalWon: Int!
  totalStaked: BigInt!
  totalPayout: BigInt!
}

# ---------------- CATEGORY ----------------
enum Category {
  CRYPTO
  POLITICS
  SPORTS
  TECHNOLOGY
  INTERNATIONAL
}

# ---------------- MARKET ----------------
type Market @entity(immutable: false) {
  id: ID!
  category: Category!
  contractAddress: Bytes!
  totalBets: Int!
  totalVolume: BigInt!
  totalFees: BigInt!
  bets: [Bet!]! @derivedFrom(field: "market")
}

# ---------------- BUCKET ----------------
type Bucket @entity(immutable: false) {
  id: ID!
  market: Market!
  totalBets: Int!
  totalStaked: BigInt!
  aggregationComplete: Boolean!
  totalWinningWeight: BigInt!
  nextProcessIndex: Int!
  expectedPayoutsComputed: Boolean!
  # DPM fields
  totalExited: BigInt!
  bets: [Bet!]! @derivedFrom(field: "bucketRef")
  betIds: [String!]!
}

# ---------------- PRICE AT TIMESTAMP ----------------
type PriceAtTimestamp @entity(immutable: false) {
  id: ID!
  market: Market!
  timestamp: BigInt!
  price: BigInt!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

# ---------------- BET ----------------
type Bet @entity(immutable: false) {
  id: ID!
  user: User!
  market: Market!
  bucket: Int!
  bucketRef: Bucket!

  stake: BigInt!
  priceMin: BigInt!
  priceMax: BigInt!
  targetTimestamp: BigInt!
  qualityBps: BigInt!
  weight: BigInt!

  asset: String!

  finalized: Boolean!
  claimed: Boolean!
  actualPrice: BigInt!
  won: Boolean!

  payout: BigInt!
  expectedPayout: BigInt!

  wonCounted: Boolean!

  # DPM fields
  entryBandWeight: BigInt!
  exited: Boolean!
  exitPayout: BigInt!
  exitFee: BigInt!

  blockNumber: BigInt!
  timestamp: BigInt!
  transactionHash: Bytes!
}

# ---------------- FEE ----------------
type Fee @entity(immutable: true) {
  id: ID!
  market: Market!
  amount: BigInt!
  blockNumber: BigInt!
  timestamp: BigInt!
  transactionHash: Bytes!
}
